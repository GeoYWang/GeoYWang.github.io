<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact List</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 2rem; }
    h1 { color: #333; }
    ul { list-style: none; padding: 0; }
    li { margin: 0.5rem 0; }
    a { text-decoration: none; color: #0066cc; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Contact Links</h1>
  <ul id="file-list">Loading...</ul>
  <script>
    const username = 'geoywang';
    const repo = 'geoywang.github.io';
    const path = 'contact';

    fetch(`https://api.github.com/repos/${username}/${repo}/contents/${path}`)
      .then(res => {
        if (!res.ok) throw new Error('API error: ' + res.status);
        return res.json();
      })
      .then(files => {
        const ul = document.getElementById('file-list');
        ul.innerHTML = '';
        files
          .filter(file => file.type === 'dir')
          .forEach(file => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = `./${file.name}/`;
            a.textContent = file.name;
            li.appendChild(a);
            ul.appendChild(li);
          });
        if (ul.children.length === 0) {
          ul.innerHTML = '<li>No contact pages found.</li>';
        }
      })
      .catch(err => {
        console.error(err);
        document.getElementById('file-list').innerHTML = 'Failed to load.';
      });
  </script>
</body>
</html>
